<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orírùn — Offline</title>
  <style>
    :root { --green:#0f7b3d; --brass:#b8860b; --paper:#fffef9; --ink:#1b2a1f; --muted:#5a6a62; }
    * { box-sizing:border-box; }
    body {
      background:#faf7f2; color:var(--ink);
      font-family:'Poppins','Segoe UI',system-ui,sans-serif;
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      min-height:100vh; text-align:center; padding:24px; margin:0;
    }
    .card {
      background:var(--paper); border:1px solid rgba(20,40,30,.12);
      border-top:3px solid var(--brass); border-radius:16px;
      box-shadow:0 12px 32px rgba(15,45,30,.10);
      max-width:420px; width:100%; padding:32px 26px;
    }
    img { width:96px; height:auto; margin-bottom:18px; }
    h1 { font-size:1.5rem; margin:0 0 8px; color:var(--green); }
    p { font-size:1rem; line-height:1.6; color:var(--muted); margin:0 auto 10px; max-width:340px; }
    .hint {
      font-size:.9rem; color:var(--ink); background:#f3faf3;
      border-left:3px solid var(--green); border-radius:8px;
      padding:12px 14px; margin:18px 0 6px; text-align:left;
    }
    .retry {
      margin-top:20px; padding:12px 24px; background:var(--green); color:#fff;
      border:none; border-radius:10px; cursor:pointer; font-size:1rem; font-weight:600;
      min-height:48px; box-shadow:0 2px 8px rgba(15,123,61,.25);
    }
    .status { margin-top:14px; font-size:.85rem; color:var(--muted); }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#c0392b; margin-right:6px; vertical-align:middle; }
    .dot.on { background:var(--green); }
  </style>
</head>
<body>
  <div class="card">
    <img src="/public/img/icons/icon-512.png" alt="Orírùn">
    <h1>You're offline</h1>
    <p>Your connection dropped, but Orírùn keeps what you've already seen.</p>
    <div class="hint">
      Odù and numerology readings you've opened before will still work offline.
      New readings and the assistant need a connection — they'll return the moment you're back online.
    </div>
    <button class="retry" onclick="location.reload()">↻ Try again</button>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">Waiting for connection…</span></div>
  </div>
  <script>
    function reflect() {
      var on = navigator.onLine;
      document.getElementById('dot').className = 'dot' + (on ? ' on' : '');
      document.getElementById('statusText').textContent = on ? 'Connection restored — reloading…' : 'Waiting for connection…';
      if (on) setTimeout(function(){ location.href = '/'; }, 800);
    }
    window.addEventListener('online', reflect);
    window.addEventListener('offline', reflect);
    reflect();
  </script>
</body>
</html>
